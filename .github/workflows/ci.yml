name: Build and Release

on:
  push:
    branches:
      - master
  pull_request:
  release:
    types:
      - published

jobs:
  build:
    name: Build assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout nijisanji-ime-dic
        uses: actions/checkout@v6

      - name: Checkout userdic-py
        uses: actions/checkout@v6
        with:
          repository: Umichang/userdic-py
          path: userdic-py

      - name: Install userdic-py
        working-directory: userdic-py
        run: |
          make install PREFIX="$PWD"
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install nkf
        run: |
          sudo apt-get update
          sudo apt-get install -y nkf

      - name: Generate dictionaries
        run: make

      - name: Upload assets to artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dictionaries
          path: build/
          if-no-files-found: error

      - name: Upload assets to release
        if: ${{ github.event_name == 'release' }}
        run: gh release upload "${{ github.ref_name }}" build/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
